<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Marine Chart — Perth WA</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    background: #020617;
    overflow: hidden;
    height: 100vh;
    height: 100dvh;
    width: 100vw;
    position: fixed;
    top: 0; left: 0;
  }

  #map {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* Top bar */
  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: env(safe-area-inset-top, 8px) 14px 0;
    padding-top: calc(env(safe-area-inset-top, 8px) + 8px);
    background: linear-gradient(180deg, rgba(2,6,23,0.88) 0%, rgba(2,6,23,0.4) 70%, transparent 100%);
    pointer-events: none;
    z-index: 10;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 8px;
    pointer-events: auto;
  }

  .brand-title {
    font-size: 14px;
    font-weight: 700;
    color: #e2e8f0;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .brand-badge {
    font-size: 8px;
    padding: 2px 5px;
    border-radius: 3px;
    background: rgba(56,189,248,0.15);
    color: #38bdf8;
    font-weight: 600;
    letter-spacing: 0.1em;
  }

  .cursor-coord {
    font-size: 10px;
    color: #475569;
    letter-spacing: 0.03em;
    padding-top: 3px;
  }

  /* GPS info panel */
  .gps-panel {
    position: absolute;
    top: calc(env(safe-area-inset-top, 8px) + 44px);
    left: 10px;
    background: rgba(2,6,23,0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 10px;
    padding: 10px 14px;
    z-index: 10;
    border: 1px solid rgba(56,189,248,0.15);
    min-width: 190px;
    display: none;
  }

  .gps-panel.active { display: block; }

  .gps-panel-header {
    font-size: 11px;
    color: #38bdf8;
    font-weight: 600;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .gps-dot-live {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #22c55e;
    animation: pulse 2s ease-in-out infinite;
  }

  .gps-dot-sim {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #f59e0b;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

  .gps-coords {
    font-size: 11px;
    color: #cbd5e1;
    line-height: 1.7;
  }

  .gps-meta {
    display: flex;
    gap: 14px;
    color: #94a3b8;
    font-size: 10px;
  }

  .gps-accuracy {
    color: #475569;
    font-size: 9px;
  }

  .gps-error {
    position: absolute;
    top: calc(env(safe-area-inset-top, 8px) + 44px);
    left: 10px;
    background: rgba(127,29,29,0.85);
    backdrop-filter: blur(12px);
    border-radius: 8px;
    padding: 8px 12px;
    z-index: 10;
    font-size: 10px;
    color: #fca5a5;
    border: 1px solid rgba(239,68,68,0.3);
    max-width: 250px;
    display: none;
  }

  .gps-error.active { display: block; }

  /* Bottom controls */
  .bottom-controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    pointer-events: none;
    padding-bottom: env(safe-area-inset-bottom, 12px);
  }

  .layer-row {
    display: flex;
    gap: 7px;
    padding: 0 10px 8px;
    overflow-x: auto;
    pointer-events: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .layer-row::-webkit-scrollbar { display: none; }

  .layer-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 12px;
    border-radius: 8px;
    border: 1.5px solid rgba(255,255,255,0.08);
    background: rgba(15,23,42,0.75);
    color: #64748b;
    font-size: 12px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .layer-btn.on {
    border-color: rgba(56,189,248,0.35);
    background: rgba(56,189,248,0.1);
    color: #7dd3fc;
  }

  .layer-btn.disabled {
    opacity: 0.4;
    cursor: default;
  }

  .layer-btn .icon { font-size: 14px; }

  .gps-row {
    display: flex;
    gap: 8px;
    padding: 0 10px 12px;
    pointer-events: auto;
  }

  .gps-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 11px;
    border-radius: 10px;
    border: 1.5px solid rgba(255,255,255,0.08);
    background: rgba(15,23,42,0.8);
    color: #94a3b8;
    font-size: 12px;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: all 0.2s ease;
    letter-spacing: 0.04em;
  }

  .gps-btn.tracking {
    border-color: rgba(34,197,94,0.4);
    background: rgba(34,197,94,0.1);
    color: #86efac;
  }

  .gps-btn.sim {
    border-color: rgba(245,158,11,0.4);
    background: rgba(245,158,11,0.1);
    color: #fcd34d;
  }

  .center-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 11px 15px;
    border-radius: 10px;
    border: 1.5px solid rgba(255,255,255,0.08);
    background: rgba(15,23,42,0.8);
    color: #94a3b8;
    cursor: pointer;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: all 0.2s ease;
  }

  .center-btn.following {
    border-color: rgba(56,189,248,0.4);
    background: rgba(56,189,248,0.1);
    color: #7dd3fc;
  }

  .center-btn.hidden { display: none; }

  /* Override MapLibre controls */
  .maplibregl-ctrl-attrib {
    font-size: 9px !important;
    background: rgba(2,6,23,0.5) !important;
    color: #475569 !important;
    border-radius: 3px !important;
    font-family: 'JetBrains Mono', monospace !important;
  }
  .maplibregl-ctrl-attrib a { color: #64748b !important; }

  .maplibregl-ctrl-group {
    background: rgba(15,23,42,0.8) !important;
    border: 1px solid rgba(255,255,255,0.06) !important;
    border-radius: 8px !important;
    backdrop-filter: blur(12px) !important;
    -webkit-backdrop-filter: blur(12px) !important;
    overflow: hidden !important;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;
  }

  .maplibregl-ctrl-group button {
    width: 34px !important; height: 34px !important;
    border-color: rgba(255,255,255,0.04) !important;
  }
  .maplibregl-ctrl-group button:hover { background: rgba(56,189,248,0.1) !important; }
  .maplibregl-ctrl button .maplibregl-ctrl-icon { filter: invert(0.65) !important; }

  .maplibregl-ctrl-scale {
    background: rgba(2,6,23,0.5) !important;
    color: #94a3b8 !important;
    border-color: #475569 !important;
    font-family: 'JetBrains Mono', monospace !important;
    font-size: 9px !important;
    border-radius: 3px !important;
    padding: 1px 5px !important;
    border-width: 1px !important;
    border-top: none !important;
  }
</style>
</head>
<body>

<div id="map"></div>

<!-- Top bar -->
<div class="top-bar">
  <div class="brand">
    <span style="font-size:17px">⚓</span>
    <span class="brand-title">Marine Chart</span>
    <span class="brand-badge">PROTO</span>
  </div>
  <div class="cursor-coord" id="cursorCoord"></div>
</div>

<!-- GPS panel -->
<div class="gps-panel" id="gpsPanel">
  <div class="gps-panel-header">
    <span id="gpsDot" class="gps-dot-live"></span>
    <span id="gpsLabel">GPS ACTIVE</span>
  </div>
  <div class="gps-coords" id="gpsCoords"></div>
</div>

<div class="gps-error" id="gpsError"></div>

<!-- Bottom controls -->
<div class="bottom-controls">
  <div class="layer-row">
    <button class="layer-btn on" id="btnSeamarks" onclick="toggleSeamarks()">
      <span class="icon">🚩</span> Sea Marks
    </button>
    <button class="layer-btn disabled">
      <span class="icon">🌊</span> Bathymetry
    </button>
    <button class="layer-btn disabled">
      <span class="icon">🌡️</span> SST
    </button>
    <button class="layer-btn disabled">
      <span class="icon">🧬</span> Chlorophyll
    </button>
    <button class="layer-btn disabled">
      <span class="icon">〰️</span> Currents
    </button>
  </div>

  <div class="gps-row">
    <button class="gps-btn" id="btnGPS" onclick="toggleGPS()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
      </svg>
      START GPS
    </button>
    <button class="gps-btn" id="btnSim" onclick="toggleSimGPS()" style="flex:none; padding: 11px 14px;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/>
        <circle cx="12" cy="10" r="3"/>
      </svg>
      SIM
    </button>
    <button class="center-btn hidden" id="btnCenter" onclick="centerOnGPS()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="3 11 22 2 13 21 11 13 3 11"/>
      </svg>
    </button>
  </div>
</div>

<script>
// ============================================================
// State
// ============================================================
let map;
let gpsWatchId = null;
let gpsMode = 'off'; // 'off' | 'live' | 'sim'
let currentPos = null;
let followGPS = false;
let seamarksVisible = true;
let simInterval = null;
let trackCoords = [];

// Simulated route: Fremantle → Rottnest Island
const SIM_ROUTE = [
  [115.7486, -32.0569], // Fremantle harbour
  [115.7420, -32.0540],
  [115.7320, -32.0500],
  [115.7180, -32.0440],
  [115.7020, -32.0380],
  [115.6850, -32.0310],
  [115.6680, -32.0240],
  [115.6500, -32.0170],
  [115.6300, -32.0100],
  [115.6100, -32.0040],
  [115.5900, -31.9990],
  [115.5700, -31.9950],
  [115.5520, -31.9920],
  [115.5370, -31.9900],
  [115.5240, -31.9890], // Approaching Rottnest
  [115.5130, -31.9880],
  [115.5050, -31.9875],
  [115.4980, -31.9870], // Thomson Bay
];
let simIndex = 0;

// ============================================================
// Coordinate formatting
// ============================================================
function fmtCoord(lat, lng) {
  const latD = Math.floor(Math.abs(lat));
  const latM = ((Math.abs(lat) - latD) * 60).toFixed(3);
  const lngD = Math.floor(Math.abs(lng));
  const lngM = ((Math.abs(lng) - lngD) * 60).toFixed(3);
  return `${latD}°${latM}'${lat >= 0 ? 'N' : 'S'}  ${lngD}°${lngM}'${lng >= 0 ? 'E' : 'W'}`;
}

function fmtSpeed(ms) {
  if (ms == null || isNaN(ms)) return '—';
  return (ms * 1.94384).toFixed(1) + ' kn';
}

function fmtHeading(deg) {
  if (deg == null || isNaN(deg)) return '—';
  return Math.round(deg) + '°';
}

// ============================================================
// Map Init
// ============================================================
function initMap() {
  map = new maplibregl.Map({
    container: 'map',
    style: {
      version: 8,
      sources: {
        'osm': {
          type: 'raster',
          tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
          tileSize: 256,
          attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
          maxzoom: 19
        },
        'seamark': {
          type: 'raster',
          tiles: ['https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png'],
          tileSize: 256,
          attribution: '© <a href="https://openseamap.org">OpenSeaMap</a>',
          maxzoom: 18
        }
      },
      layers: [
        { id: 'osm-base', type: 'raster', source: 'osm' },
        { id: 'seamark-overlay', type: 'raster', source: 'seamark', paint: { 'raster-opacity': 0.9 } }
      ],
      glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf'
    },
    center: [115.75, -31.97],
    zoom: 11,
    maxZoom: 18,
    minZoom: 3,
    attributionControl: true
  });

  map.addControl(new maplibregl.NavigationControl({ showCompass: true }), 'top-right');
  map.addControl(new maplibregl.ScaleControl({ maxWidth: 140, unit: 'nautical' }), 'bottom-left');

  map.on('mousemove', (e) => {
    document.getElementById('cursorCoord').textContent = fmtCoord(e.lngLat.lat, e.lngLat.lng);
  });

  map.on('touchmove', (e) => {
    // On mobile, don't update constantly
  });

  map.on('moveend', () => {
    const c = map.getCenter();
    document.getElementById('cursorCoord').textContent = fmtCoord(c.lat, c.lng);
  });
}

// ============================================================
// GPS marker + track
// ============================================================
function makeCircle(center, radiusM, pts) {
  pts = pts || 48;
  const coords = [];
  const km = radiusM / 1000;
  for (let i = 0; i <= pts; i++) {
    const a = (i / pts) * 2 * Math.PI;
    const dx = km * Math.cos(a);
    const dy = km * Math.sin(a);
    coords.push([
      center[0] + dx / (111.32 * Math.cos(center[1] * Math.PI / 180)),
      center[1] + dy / 111.32
    ]);
  }
  return { type: 'Feature', geometry: { type: 'Polygon', coordinates: [coords] } };
}

function updateMarker(pos) {
  const coords = [pos.lng, pos.lat];

  // Accuracy ring
  const accGeo = makeCircle(coords, pos.accuracy || 20);
  if (!map.getSource('gps-acc')) {
    map.addSource('gps-acc', { type: 'geojson', data: accGeo });
    map.addLayer({ id: 'gps-acc-fill', type: 'fill', source: 'gps-acc',
      paint: { 'fill-color': '#0ea5e9', 'fill-opacity': 0.07 } });
    map.addLayer({ id: 'gps-acc-line', type: 'line', source: 'gps-acc',
      paint: { 'line-color': '#0ea5e9', 'line-width': 1, 'line-opacity': 0.25 } });
  } else {
    map.getSource('gps-acc').setData(accGeo);
  }

  // Track line
  trackCoords.push(coords);
  const trackGeo = { type: 'Feature', geometry: { type: 'LineString', coordinates: trackCoords } };
  if (!map.getSource('gps-track')) {
    map.addSource('gps-track', { type: 'geojson', data: trackGeo });
    map.addLayer({ id: 'gps-track-line', type: 'line', source: 'gps-track',
      paint: { 'line-color': '#f59e0b', 'line-width': 2.5, 'line-opacity': 0.65 } }, 'gps-acc-fill');
  } else {
    map.getSource('gps-track').setData(trackGeo);
  }

  // Position point
  const ptGeo = { type: 'Feature', geometry: { type: 'Point', coordinates: coords } };
  if (!map.getSource('gps-pt')) {
    map.addSource('gps-pt', { type: 'geojson', data: ptGeo });
    map.addLayer({ id: 'gps-glow', type: 'circle', source: 'gps-pt',
      paint: { 'circle-radius': 18, 'circle-color': '#0ea5e9', 'circle-opacity': 0.12, 'circle-blur': 1 } });
    map.addLayer({ id: 'gps-outer', type: 'circle', source: 'gps-pt',
      paint: { 'circle-radius': 10, 'circle-color': '#0c4a6e', 'circle-opacity': 0.7 } });
    map.addLayer({ id: 'gps-inner', type: 'circle', source: 'gps-pt',
      paint: { 'circle-radius': 6, 'circle-color': '#38bdf8', 'circle-stroke-width': 2, 'circle-stroke-color': '#fff' } });
  } else {
    map.getSource('gps-pt').setData(ptGeo);
  }

  // Heading indicator (if available)
  if (pos.heading != null && !isNaN(pos.heading)) {
    const headRad = pos.heading * Math.PI / 180;
    const d = 0.0004;
    const headCoords = [
      coords,
      [coords[0] + d * Math.sin(headRad), coords[1] + d * Math.cos(headRad)]
    ];
    const headGeo = { type: 'Feature', geometry: { type: 'LineString', coordinates: headCoords } };
    if (!map.getSource('gps-heading')) {
      map.addSource('gps-heading', { type: 'geojson', data: headGeo });
      map.addLayer({ id: 'gps-heading-line', type: 'line', source: 'gps-heading',
        paint: { 'line-color': '#f43f5e', 'line-width': 2.5, 'line-opacity': 0.8 } });
    } else {
      map.getSource('gps-heading').setData(headGeo);
    }
  }

  // Update panel
  document.getElementById('gpsCoords').innerHTML =
    `<div>${fmtCoord(pos.lat, pos.lng)}</div>` +
    `<div class="gps-meta"><span>SPD ${fmtSpeed(pos.speed)}</span><span>HDG ${fmtHeading(pos.heading)}</span></div>` +
    `<div class="gps-accuracy">±${Math.round(pos.accuracy || 0)}m</div>`;

  // Follow
  if (followGPS) {
    map.easeTo({ center: coords, duration: 800 });
  }
}

// ============================================================
// Live GPS
// ============================================================
function toggleGPS() {
  if (gpsMode === 'live') {
    stopLiveGPS();
    return;
  }
  if (gpsMode === 'sim') stopSimGPS();

  if (!navigator.geolocation) {
    showGPSError('Geolocation not supported by this browser');
    return;
  }

  gpsMode = 'live';
  followGPS = true;
  trackCoords = [];
  hideGPSError();

  document.getElementById('btnGPS').classList.add('tracking');
  document.getElementById('btnGPS').innerHTML = svgCrosshair() + ' GPS TRACKING';
  document.getElementById('gpsPanel').classList.add('active');
  document.getElementById('gpsDot').className = 'gps-dot-live';
  document.getElementById('gpsLabel').textContent = 'GPS ACTIVE';
  document.getElementById('btnCenter').classList.remove('hidden');

  gpsWatchId = navigator.geolocation.watchPosition(
    (p) => {
      currentPos = {
        lat: p.coords.latitude,
        lng: p.coords.longitude,
        accuracy: p.coords.accuracy,
        heading: p.coords.heading,
        speed: p.coords.speed
      };
      updateMarker(currentPos);
    },
    (err) => {
      showGPSError(err.message);
      stopLiveGPS();
    },
    { enableHighAccuracy: true, maximumAge: 3000, timeout: 15000 }
  );
}

function stopLiveGPS() {
  if (gpsWatchId !== null) {
    navigator.geolocation.clearWatch(gpsWatchId);
    gpsWatchId = null;
  }
  gpsMode = 'off';
  followGPS = false;
  document.getElementById('btnGPS').classList.remove('tracking');
  document.getElementById('btnGPS').innerHTML = svgCrosshair() + ' START GPS';
  document.getElementById('gpsPanel').classList.remove('active');
  document.getElementById('btnCenter').classList.add('hidden');
}

// ============================================================
// Simulated GPS — Fremantle to Rottnest
// ============================================================
function toggleSimGPS() {
  if (gpsMode === 'sim') {
    stopSimGPS();
    return;
  }
  if (gpsMode === 'live') stopLiveGPS();

  gpsMode = 'sim';
  followGPS = true;
  trackCoords = [];
  simIndex = 0;
  hideGPSError();

  document.getElementById('btnSim').classList.add('sim');
  document.getElementById('gpsPanel').classList.add('active');
  document.getElementById('gpsDot').className = 'gps-dot-sim';
  document.getElementById('gpsLabel').textContent = 'SIM — Freo → Rottnest';
  document.getElementById('btnCenter').classList.remove('hidden');

  map.flyTo({ center: SIM_ROUTE[0], zoom: 12, duration: 1500 });

  simInterval = setInterval(() => {
    if (simIndex >= SIM_ROUTE.length) {
      simIndex = 0;
      trackCoords = [];
    }

    const pt = SIM_ROUTE[simIndex];
    let heading = null, speed = null;

    if (simIndex > 0) {
      const prev = SIM_ROUTE[simIndex - 1];
      const dx = pt[0] - prev[0];
      const dy = pt[1] - prev[1];
      heading = (Math.atan2(dx, dy) * 180 / Math.PI + 360) % 360;
      const distM = Math.sqrt(dx * dx + dy * dy) * 111320;
      speed = distM / 2; // 2 seconds interval → m/s
    }

    currentPos = {
      lat: pt[1], lng: pt[0],
      accuracy: 8 + Math.random() * 5,
      heading: heading,
      speed: speed != null ? Math.min(speed, 6) : null // cap at ~12kn
    };

    updateMarker(currentPos);
    simIndex++;
  }, 2000);
}

function stopSimGPS() {
  if (simInterval) { clearInterval(simInterval); simInterval = null; }
  gpsMode = 'off';
  followGPS = false;
  document.getElementById('btnSim').classList.remove('sim');
  document.getElementById('gpsPanel').classList.remove('active');
  document.getElementById('btnCenter').classList.add('hidden');
}

// ============================================================
// Layer toggle
// ============================================================
function toggleSeamarks() {
  seamarksVisible = !seamarksVisible;
  map.setLayoutProperty('seamark-overlay', 'visibility', seamarksVisible ? 'visible' : 'none');
  document.getElementById('btnSeamarks').classList.toggle('on', seamarksVisible);
}

// ============================================================
// Helpers
// ============================================================
function centerOnGPS() {
  if (currentPos) {
    map.flyTo({ center: [currentPos.lng, currentPos.lat], zoom: 14, duration: 1200 });
    followGPS = true;
    document.getElementById('btnCenter').classList.add('following');
  }
}

function showGPSError(msg) {
  const el = document.getElementById('gpsError');
  el.textContent = 'GPS: ' + msg;
  el.classList.add('active');
}

function hideGPSError() {
  document.getElementById('gpsError').classList.remove('active');
}

function svgCrosshair() {
  return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>`;
}

// User drags map → stop auto-follow
document.addEventListener('DOMContentLoaded', () => {
  initMap();
  map.on('dragstart', () => {
    followGPS = false;
    document.getElementById('btnCenter').classList.remove('following');
  });
});
</script>
</body>
</html>
